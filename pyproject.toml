[tool.black]
line-length = 115
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist

  # The following are specific to Black, you probably don't want those.
  | blib2to3
  | tests/data
)/
'''

[tool.typos.default.extend-identifiers]
pixelx = "pixelx"
minpixelx = "minpixelx"
maxpixelx = "maxpixelx"
pixely = "pixely"
minpixely = "minpixely"
maxpixely = "maxpixely"
arry = "arry"
